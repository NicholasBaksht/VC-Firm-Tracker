name: Update Stock Prices

# Runs automatically every day at 9:30am Eastern (1:30pm UTC),
# right after the US stock market opens. Also allows Peter to
# trigger it manually from GitHub's "Actions" tab any time.
on:
  schedule:
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch current prices
        run: python update_prices.py

      - name: Commit and push if prices changed
        run: |
          git config user.name "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "Update stock prices"
          git push
